name: lifehelm
description: "LifeHelm — Take the helm of your life. Système d'exploitation de vie pour l'Afrique francophone."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Network
  dio: ^5.7.0
  retrofit: ^4.4.1
  pretty_dio_logger: ^1.4.0

  # Local storage / offline
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  flutter_svg: ^2.0.10
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  phosphor_flutter: ^2.1.0

  # Forms
  flutter_form_builder: ^10.0.0
  form_builder_validators: ^11.0.0

  # Date / time
  intl: ^0.20.0
  table_calendar: ^3.1.2

  # Notifications
  flutter_local_notifications: ^17.2.3
  # firebase_messaging: ^15.1.3 # pour plus tard

  # Utils
  uuid: ^4.5.1
  logger: ^2.4.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  share_plus: ^10.0.2
  package_info_plus: ^8.0.2
  device_info_plus: ^11.1.0
  connectivity_plus: ^6.0.5
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.4
  drift_dev: ^2.20.3
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/translations/
    # Créer les dossiers vides ci-dessous si nécessaire :
    # - assets/images/
    # - assets/icons/
    # - assets/flags/

  # Pour ajouter la police Inter, téléchargez les fichiers TTF dans assets/fonts/
  # puis décommentez cette section.
  # fonts:
  #   - family: LifeHelmSans
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
