# Nixpacks config — Railway build sans Docker
[phases.setup]
nixPkgs = ['nodejs_20']
aptPkgs = ['openssl']

[phases.install]
cmds = ['cd backend && npm ci']

[phases.build]
cmds = [
  'cd backend && npx prisma generate',
  'cd backend && npx tsc -p .'
]

[start]
cmd = 'cd backend && node dist/index.js'
